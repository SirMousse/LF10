<!DOCTYPE html>
<html lang="de">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hobbit-Haus</title>
    <link rel="stylesheet" href="hobbit-haus.css" />
    </head>
    <body>

    <header>
        <h1>Das Hobbit-Haus</h1>
    </header>

    <main class="szenen-wrapper">

        <!-- ============================
            SZENE 1 – FRÜHLING
            ============================ -->
        <article class="szene-card">
        <div class="szene">

        <section class="himmel" aria-label="Himmel">
            <span class="wolke wolke-1"></span>
            <span class="wolke wolke-2"></span>
            <span class="wolke wolke-3"></span>
            <span class="wolke wolke-4"></span>
            <span class="sonne"></span>
        </section>

        <section class="wiese" aria-label="Wiese">

            <!-- Blumen -->
            <span class="blume blume-gelb" style="bottom:60%; left:10%;"></span>
            <span class="blume blume-rot"  style="bottom:58%; left:18%;"></span>
            <span class="blume blume-lila" style="bottom:62%; left:72%;"></span>
            <span class="blume blume-gelb" style="bottom:56%; left:82%;"></span>
            <span class="blume blume-rot"  style="bottom:64%; left:88%;"></span>

            <!-- Weg aus Steinen -->
            <ol class="weg" aria-label="Steinweg">
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            </ol>

        </section>

        <span class="huegel" aria-hidden="true"></span>

        <section class="haus" aria-label="Hobbit-Haus">

            <span class="schornstein" aria-hidden="true">
            <span class="rauch rauch-1"></span>
            <span class="rauch rauch-2"></span>
            <span class="rauch rauch-3"></span>
            </span>

            <!-- Fenster: rgba() -->
            <span class="fenster fenster-links"  aria-hidden="true"><span class="fenster-kreuz"></span></span>
            <span class="fenster fenster-rechts" aria-hidden="true"><span class="fenster-kreuz"></span></span>

            <!-- Tür: Hex-Farbe #5c2e0a -->
            <span class="tuer-rahmen" aria-hidden="true"></span>
            <span class="tuer"        aria-hidden="true"></span>

        </section>

        </div><!-- /szene -->
        <footer class="szene-label">🌸 Frühling</footer>

        </article>


        <!-- ============================
            SZENE 2 – HERBST
            ============================ -->
        <article class="szene-card">
        <div class="szene herbst">

        <section class="himmel" aria-label="Himmel">
            <span class="wolke wolke-1"></span>
            <span class="wolke wolke-3"></span>
            <span class="wolke wolke-4"></span>
            <span class="sonne"></span>
        </section>

        <section class="wiese" aria-label="Wiese">

            <!-- Herbstblätter -->
            <span class="blatt" style="background:#c0520a; bottom:60%; left:9%;  transform:rotate(20deg);"></span>
            <span class="blatt" style="background:#e07010; bottom:62%; left:17%; transform:rotate(-15deg);"></span>
            <span class="blatt" style="background:#a04010; bottom:58%; left:75%; transform:rotate(35deg);"></span>
            <span class="blatt" style="background:#d06020; bottom:63%; left:84%; transform:rotate(-25deg);"></span>
            <span class="blatt" style="background:#b84010; bottom:57%; left:91%; transform:rotate(10deg);"></span>

            <ol class="weg" aria-label="Steinweg">
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            </ol>

        </section>

        <span class="huegel" aria-hidden="true"></span>

        <section class="haus" aria-label="Hobbit-Haus">

            <span class="schornstein" aria-hidden="true">
            <span class="rauch rauch-1"></span>
            <span class="rauch rauch-2"></span>
            <span class="rauch rauch-3"></span>
            </span>

            <span class="fenster fenster-links"  aria-hidden="true"><span class="fenster-kreuz"></span></span>
            <span class="fenster fenster-rechts" aria-hidden="true"><span class="fenster-kreuz"></span></span>

            <span class="tuer-rahmen" aria-hidden="true"></span>
            <span class="tuer"        aria-hidden="true"></span>

        </section>

        </div><!-- /szene -->
        <footer class="szene-label">🍂 Herbst</footer>

        </article>


        <!-- ============================
            SZENE 3 – NACHT
            ============================ -->
        <article class="szene-card">
        <div class="szene nacht">

        <section class="himmel" aria-label="Himmel">

            <!-- Sterne -->
            <span class="stern" style="width:3px;height:3px; top:8%;  left:6%;  animation-delay:0.2s;"></span>
            <span class="stern" style="width:2px;height:2px; top:15%; left:14%; animation-delay:0.8s;"></span>
            <span class="stern" style="width:4px;height:4px; top:6%;  left:28%; animation-delay:1.3s;"></span>
            <span class="stern" style="width:2px;height:2px; top:20%; left:40%; animation-delay:0.5s;"></span>
            <span class="stern" style="width:3px;height:3px; top:9%;  left:50%; animation-delay:1.8s;"></span>
            <span class="stern" style="width:2px;height:2px; top:18%; left:62%; animation-delay:0.3s;"></span>
            <span class="stern" style="width:3px;height:3px; top:25%; left:76%; animation-delay:1.1s;"></span>
            <span class="stern" style="width:4px;height:4px; top:7%;  left:88%; animation-delay:0.7s;"></span>
            <span class="stern" style="width:2px;height:2px; top:30%; left:20%; animation-delay:2.0s;"></span>
            <span class="stern" style="width:2px;height:2px; top:32%; left:55%; animation-delay:1.5s;"></span>
            <span class="stern" style="width:3px;height:3px; top:14%; left:95%; animation-delay:0.9s;"></span>

            <span class="wolke wolke-3"></span>
            <!-- Mond (als .sonne gestylt via CSS) -->
            <span class="sonne"></span>

        </section>

        <section class="wiese" aria-label="Wiese">
            <ol class="weg" aria-label="Steinweg">
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            <li class="stein"></li>
            </ol>
        </section>

        <span class="huegel" aria-hidden="true"></span>

        <section class="haus" aria-label="Hobbit-Haus">

            <span class="schornstein" aria-hidden="true">
            <span class="rauch rauch-1"></span>
            <span class="rauch rauch-2"></span>
            <span class="rauch rauch-3"></span>
            </span>

            <span class="fenster fenster-links"  aria-hidden="true"><span class="fenster-kreuz"></span></span>
            <span class="fenster fenster-rechts" aria-hidden="true"><span class="fenster-kreuz"></span></span>

            <span class="tuer-rahmen" aria-hidden="true"></span>
            <span class="tuer"        aria-hidden="true"></span>

        </section>

        </div><!-- /szene -->
        <footer class="szene-label">🌙 Nacht</footer>

        </article>

    </main>

    </body>
</html>
