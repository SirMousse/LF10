<!-- Programmierkarten-Design

Gestalte eine Karte für ein fiktives Coding-Spiel.

Vorgaben:   - Hintergrund mit linear-gradient
            - Farben sollen seriös-techy sein, z. B. #1e1e2f, #2b5876, #4e4376
            - Richtung frei
            - Weiße Schrift darauf

Ziel: Eine Karte für „Code Master Level 99“. -->

<!DOCTYPE html>
<html lang="de">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Master Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
        min-height: 100vh;
        background: #0d0d1a;
        display: grid;
        place-items: center;
        font-family: 'Share Tech Mono', monospace;
        }

        main {
        perspective: 900px;
        padding: 4rem 2rem;
        }

        article {
        width: 340px;
        height: 540px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.08s ease-out;
        border-radius: 20px;
        cursor: pointer;
        }

        article::before {
        content: '';
        position: absolute;
        left: -7px; top: 18px; bottom: 18px;
        width: 7px;
        background: linear-gradient(to bottom, #3344aa, #6644aa, #1e2050);
        border-radius: 4px 0 0 4px;
        transform: translateZ(-2px);
        filter: brightness(0.55);
        }

        article::after {
        content: '';
        position: absolute;
        bottom: -7px; left: 18px; right: 18px;
        height: 7px;
        background: linear-gradient(to right, #1e1e2f, #2b3876, #1e1e2f);
        border-radius: 0 0 4px 4px;
        transform: translateZ(-2px);
        filter: brightness(0.45);
        }

        section.face {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, #1e1e2f 0%, #2b3876 45%, #4e4376 80%, #1a1a2e 100%);
        border: 1px solid rgba(120, 140, 255, 0.35);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        }

        section.face::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(100,130,255,0.04) 28px, rgba(100,130,255,0.04) 29px),
            repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(100,130,255,0.04) 28px, rgba(100,130,255,0.04) 29px);
        pointer-events: none;
        }

        section.face::after {
        content: '';
        position: absolute;
        top: -60%; left: -30%;
        width: 80%; height: 80%;
        background: radial-gradient(ellipse, rgba(140,160,255,0.12) 0%, transparent 70%);
        pointer-events: none;
        }

        section.shine {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        pointer-events: none;
        z-index: 10;
        transition: background 0.05s;
        }

        header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.2rem;
        position: relative;
        z-index: 2;
        }

        header p {
        font-family: 'Orbitron', sans-serif;
        font-size: 0.6rem;
        letter-spacing: 0.25em;
        color: rgba(160, 185, 255, 0.7);
        text-transform: uppercase;
        }

        header span {
        font-size: 0.65rem;
        color: rgba(120, 150, 255, 0.5);
        letter-spacing: 0.1em;
        }

        mark {
        position: absolute;
        top: 1.3rem; right: 1.3rem;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.55rem;
        font-weight: 700;
        color: #ffe680;
        background: rgba(180,140,0,0.18);
        border: 1px solid rgba(255,220,80,0.3);
        border-radius: 6px;
        padding: 4px 8px;
        letter-spacing: 0.08em;
        text-shadow: 0 0 8px rgba(255,220,0,0.5);
        z-index: 5;
        }

        figure {
        position: relative;
        z-index: 2;
        width: 90px;
        height: 90px;
        margin: 0 auto 1.2rem;
        border-radius: 50%;
        background: linear-gradient(135deg, #6e8fff, #b06fff, #4e4376);
        padding: 3px;
        box-shadow:
            0 0 0 1px rgba(110,143,255,0.3),
            0 0 20px rgba(110,143,255,0.25),
            inset 0 0 12px rgba(0,0,0,0.4);
        }

        figure figcaption {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(160deg, #1e1e2f, #2b3876);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.6rem;
        font-weight: 900;
        color: #c0d0ff;
        text-shadow: 0 0 16px rgba(130,160,255,0.8);
        }

        h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.05rem;
        font-weight: 900;
        color: #e8eeff;
        text-align: center;
        letter-spacing: 0.06em;
        text-shadow: 0 0 20px rgba(130,160,255,0.6);
        position: relative;
        z-index: 2;
        margin-bottom: 0.2rem;
        }

        h2 {
        font-size: 0.65rem;
        font-weight: 400;
        color: rgba(150,175,255,0.6);
        text-align: center;
        letter-spacing: 0.18em;
        font-family: 'Share Tech Mono', monospace;
        position: relative;
        z-index: 2;
        margin-bottom: 1.2rem;
        }

        hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(120,150,255,0.4), transparent);
        margin: 0.8rem 0;
        position: relative;
        z-index: 2;
        }

        ul.stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        position: relative;
        z-index: 2;
        margin-bottom: 1rem;
        list-style: none;
        }

        ul.stats li {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(120,150,255,0.15);
        border-radius: 8px;
        padding: 8px 10px;
        }

        ul.stats li label {
        display: block;
        font-size: 0.55rem;
        color: rgba(140,165,255,0.55);
        letter-spacing: 0.15em;
        margin-bottom: 4px;
        text-transform: uppercase;
        }

        meter {
        display: block;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        margin-bottom: 3px;
        appearance: none;
        background: rgba(255,255,255,0.07);
        border: none;
        }

        meter::-webkit-meter-bar { background: rgba(255,255,255,0.07); border-radius: 2px; border: none; }
        meter::-webkit-meter-optimum-value { background: linear-gradient(to right, #5577ff, #aa66ff); border-radius: 2px; }
        meter::-moz-meter-bar { background: linear-gradient(to right, #5577ff, #aa66ff); border-radius: 2px; }

        ul.stats li output {
        display: block;
        font-size: 0.7rem;
        color: #c0d0ff;
        text-align: right;
        }

        nav {
        position: relative;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: auto;
        padding-top: 0.5rem;
        }

        nav b {
        font-size: 0.55rem;
        font-weight: 400;
        letter-spacing: 0.1em;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1px solid rgba(120,150,255,0.25);
        color: rgba(180,200,255,0.75);
        background: rgba(80,100,200,0.12);
        text-transform: uppercase;
        font-family: 'Share Tech Mono', monospace;
        }
    </style>
    </head>
    <body>
    <main id="scene">
        <article id="card">
        <section class="shine" id="shine"></section>
        <section class="face">
            <header>
            <p>Elite Coder</p>
            <span>#CM-0099</span>
            </header>
            <mark>LVL 99</mark>
            <figure>
            <figcaption>CM</figcaption>
            </figure>
            <h1>Code Master</h1>
            <h2>LEGENDARY · FULL STACK</h2>
            <hr />
            <ul class="stats">
            <li>
                <label>Algorithm</label>
                <meter min="0" max="100" value="98" optimum="100"></meter>
                <output>98</output>
            </li>
            <li>
                <label>Debugging</label>
                <meter min="0" max="100" value="95" optimum="100"></meter>
                <output>95</output>
            </li>
            <li>
                <label>Refactor</label>
                <meter min="0" max="100" value="91" optimum="100"></meter>
                <output>91</output>
            </li>
            <li>
                <label>Deploy</label>
                <meter min="0" max="100" value="87" optimum="100"></meter>
                <output>87</output>
            </li>
            </ul>
            <hr />
            <nav>
            <b>Zero-Bug Vision</b>
            <b>Git Mastery</b>
            <b>Dark Mode Native</b>
            <b>O(1) Instinct</b>
            </nav>
        </section>
        </article>
    </main>

    <script>
        const card = document.getElementById('card');
        const scene = document.getElementById('scene');
        const shine = document.getElementById('shine');

        scene.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);

        const rotY = dx * 18;
        const rotX = -dy * 12;
        card.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg) scale(1.04)`;

        const shineX = 50 + dx * 30;
        const shineY = 50 + dy * 30;
        shine.style.background = `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.10) 0%, transparent 65%)`;
        });

        scene.addEventListener('mouseleave', () => {
        card.style.transition = 'transform 0.5s ease';
        card.style.transform = 'rotateY(-12deg) rotateX(6deg) scale(1)';
        shine.style.background = 'none';
        setTimeout(() => card.style.transition = 'transform 0.08s ease-out', 500);
        });

        card.style.transform = 'rotateY(-12deg) rotateX(6deg)';
    </script>
    </body>
</html>
