<!-- Aufgabe : Saurons Lieblingssnacks ( <ul> )

Story: Sauron macht Pause vom Weltherrschen und snackt gern.

Aufgabe: Erstelle eine ungeordnete Liste (<ul>) mit seinen Lieblingssnacks:

    - Ork-Chips
    - Vulkan-Popcorn
    - Lava-Kekse

Ziel: Nur <ul> + <li>, keine Reihenfolge wichtig. -->

    <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurons Lieblingssnacks</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #ff4500;
        }

        ul {
            background: #2c2c2c;
            padding: 20px 40px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Saurons Lieblingssnacks</h1>

    <ul>
        <li>Ork-Chips</li>
        <li>Vulkan-Popcorn</li>
        <li>Lava-Kekse</li>
    </ul>

</body>
</html>
