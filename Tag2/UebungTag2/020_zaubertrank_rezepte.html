<!-- Aufgabe 2: Zaubertrank-Rezept ( <ol> )

Story: Ein Zaubertrank muss Schritt für Schritt gebraut werden.

Aufgabe: Erstelle eine geordnete Liste (<ol>) mit diesen Schritten:

    1. Zutaten sammeln
    2. Kessel erhitzen
    3. Zutaten einwerfen
    4. Umrühren
    5. Trank probieren

Ziel: Reihenfolge ist wichtig → <ol> + <li>. -->

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaubertrank-Rezept</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        ol {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Zaubertrank-Rezept</h1>

    <ol>
        <li>Zutaten sammeln</li>
        <li>Kessel erhitzen</li>
        <li>Zutaten einwerfen</li>
        <li>Umrühren</li>
        <li>Trank probieren</li>
    </ol>

</body>
</html>
